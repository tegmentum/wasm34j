name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Build the native library on each platform's own runner (CMake + wasm3 submodule).
  build-native:
    name: Native (${{ matrix.platform }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux-x86_64
            lib: libwasm34j_native.so
          - os: ubuntu-24.04-arm
            platform: linux-aarch64
            lib: libwasm34j_native.so
          - os: macos-latest
            platform: darwin-aarch64
            lib: libwasm34j_native.dylib
          - os: windows-latest
            platform: windows-x86_64
            lib: wasm34j_native.dll
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      # A JDK provides the JNI headers that CMake's find_package(JNI) needs.
      - uses: actions/setup-java@v4
        with:
          java-version: '22'
          distribution: 'temurin'

      - name: Build native library (CMake)
        shell: bash
        run: |
          cmake -S wasm34j-native -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build --config Release
          mkdir -p staging
          find build -name '${{ matrix.lib }}' -exec cp {} staging/ \;
          ls -la staging

      - uses: actions/upload-artifact@v4
        with:
          name: native-${{ matrix.platform }}
          path: staging/${{ matrix.lib }}
          retention-days: 7
          if-no-files-found: error

  # Static analysis (no native library needed; compile-only).
  quality:
    name: Code Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
      - name: Cache Maven
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: m2-quality-${{ hashFiles('**/pom.xml') }}
          restore-keys: m2-quality-
      - name: Quality gates (spotless, checkstyle, spotbugs)
        run: ./mvnw -B -ntp -Pquality -Pskip-native -DskipTests verify

  # Full test matrix on Java 22+ (both backends), using pre-built native libraries.
  test:
    name: Test Java ${{ matrix.java }} (${{ matrix.platform }})
    needs: build-native
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest,    platform: linux-x86_64,  java: '22' }
          - { os: ubuntu-latest,    platform: linux-x86_64,  java: '25' }
          - { os: ubuntu-24.04-arm, platform: linux-aarch64, java: '22' }
          - { os: macos-latest,     platform: darwin-aarch64, java: '22' }
          - { os: macos-latest,     platform: darwin-aarch64, java: '25' }
          - { os: windows-latest,   platform: windows-x86_64, java: '22' }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: ${{ matrix.java }}
          distribution: 'temurin'
      - name: Cache Maven
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: m2-test-${{ matrix.java }}-${{ hashFiles('**/pom.xml') }}
          restore-keys: m2-test-
      - name: Download native library
        uses: actions/download-artifact@v4
        with:
          name: native-${{ matrix.platform }}
          path: wasm34j-native/src/main/resources/META-INF/native/${{ matrix.platform }}/
      - name: Stage native library on each backend's classpath
        shell: bash
        run: |
          for m in wasm34j-jni wasm34j-panama; do
            mkdir -p "$m/src/main/resources/META-INF/native/${{ matrix.platform }}/"
            cp wasm34j-native/src/main/resources/META-INF/native/${{ matrix.platform }}/* \
               "$m/src/main/resources/META-INF/native/${{ matrix.platform }}/"
          done
      - name: Run tests
        run: ./mvnw -B -ntp test -Pskip-native -DargLine="--enable-native-access=ALL-UNNAMED"
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.platform }}-java${{ matrix.java }}
          path: '**/target/surefire-reports/'
          retention-days: 7

  # Java 17 path: builds and tests the JNI backend subset only (Panama requires Java 22+),
  # validating both Java 8/17 compatibility and the JNI fallback.
  test-jni-java17:
    name: Test JNI Java 17 (${{ matrix.platform }})
    needs: build-native
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest, platform: linux-x86_64 }
          - { os: macos-latest,  platform: darwin-aarch64 }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Download native library
        uses: actions/download-artifact@v4
        with:
          name: native-${{ matrix.platform }}
          path: wasm34j-native/src/main/resources/META-INF/native/${{ matrix.platform }}/
      - name: Stage native library on the JNI classpath
        shell: bash
        run: |
          mkdir -p "wasm34j-jni/src/main/resources/META-INF/native/${{ matrix.platform }}/"
          cp wasm34j-native/src/main/resources/META-INF/native/${{ matrix.platform }}/* \
             "wasm34j-jni/src/main/resources/META-INF/native/${{ matrix.platform }}/"
      - name: Run JNI tests (excludes the Panama module)
        run: ./mvnw -B -ntp test -Pskip-native -pl wasm34j-tests -am
