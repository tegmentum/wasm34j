name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  # Build the native library for every supported platform.
  build-native:
    name: Native (${{ matrix.platform }})
    strategy:
      fail-fast: true
      matrix:
        include:
          - { os: ubuntu-latest,    platform: linux-x86_64,   lib: libwasm34j_native.so }
          - { os: ubuntu-24.04-arm, platform: linux-aarch64,  lib: libwasm34j_native.so }
          - { os: macos-latest,     platform: darwin-aarch64, lib: libwasm34j_native.dylib }
          - { os: windows-latest,   platform: windows-x86_64, lib: wasm34j_native.dll }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: actions/setup-java@v4
        with:
          java-version: '22'
          distribution: 'temurin'
      - name: Build native library (CMake)
        shell: bash
        run: |
          cmake -S wasm34j-native -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build --config Release
          mkdir -p staging
          find build -name '${{ matrix.lib }}' -exec cp {} staging/ \;
      - uses: actions/upload-artifact@v4
        with:
          name: native-${{ matrix.platform }}
          path: staging/${{ matrix.lib }}
          if-no-files-found: error

  # Assemble all platforms into a single set of jars and publish.
  publish:
    needs: build-native
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
      - name: Download all native libraries
        uses: actions/download-artifact@v4
        with:
          pattern: native-*
          path: natives
      - name: Stage natives into resource trees (all platforms in one jar)
        shell: bash
        run: |
          for dir in natives/native-*; do
            platform="${dir#natives/native-}"
            for m in wasm34j-native wasm34j-jni wasm34j-panama; do
              mkdir -p "$m/src/main/resources/META-INF/native/$platform/"
              cp "$dir"/* "$m/src/main/resources/META-INF/native/$platform/"
            done
          done
          find . -path '*/META-INF/native/*' -type f
      - name: Package (native build skipped; pre-built libs bundled)
        run: ./mvnw -B -ntp -Pskip-native -DskipTests package
      - name: Upload jars to the GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            wasm34j/target/*.jar
            wasm34j-native/target/*.jar
            wasm34j-jni/target/*.jar
            wasm34j-panama/target/*.jar
      # To publish to Maven Central instead, configure the central-publishing plugin and
      # run `./mvnw -Pskip-native -DskipTests deploy` here with the appropriate secrets.
