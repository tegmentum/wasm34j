name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  # Build the native library for every supported platform.
  build-native:
    name: Native (${{ matrix.platform }})
    strategy:
      fail-fast: true
      matrix:
        include:
          - { os: ubuntu-latest,    platform: linux-x86_64,   lib: libwasm34j_native.so }
          - { os: ubuntu-24.04-arm, platform: linux-aarch64,  lib: libwasm34j_native.so }
          - { os: macos-latest,     platform: darwin-aarch64, lib: libwasm34j_native.dylib }
          - { os: windows-latest,   platform: windows-x86_64, lib: wasm34j_native.dll }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: actions/setup-java@v4
        with:
          java-version: '22'
          distribution: 'temurin'
      - name: Build native library (CMake)
        shell: bash
        run: |
          cmake -S wasm34j-native -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build --config Release
          mkdir -p staging
          find build -name '${{ matrix.lib }}' -exec cp {} staging/ \;
      - uses: actions/upload-artifact@v4
        with:
          name: native-${{ matrix.platform }}
          path: staging/${{ matrix.lib }}
          if-no-files-found: error

  # Assemble all platforms into one set of jars and publish to Maven Central + GitHub.
  # Requires repo secrets: MAVEN_CENTRAL_USERNAME, MAVEN_CENTRAL_PASSWORD,
  # GPG_PRIVATE_KEY (ASCII-armored), GPG_PASSPHRASE.
  publish:
    name: Publish
    needs: build-native
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          server-id: central
          server-username: MAVEN_CENTRAL_USERNAME
          server-password: MAVEN_CENTRAL_PASSWORD
          gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}
          gpg-passphrase: GPG_PASSPHRASE

      - name: Verify required secrets are configured
        run: |
          missing=0
          for s in MAVEN_CENTRAL_USERNAME MAVEN_CENTRAL_PASSWORD GPG_PRIVATE_KEY GPG_PASSPHRASE; do
            case "$s" in
              MAVEN_CENTRAL_USERNAME) v="${{ secrets.MAVEN_CENTRAL_USERNAME }}" ;;
              MAVEN_CENTRAL_PASSWORD) v="${{ secrets.MAVEN_CENTRAL_PASSWORD }}" ;;
              GPG_PRIVATE_KEY) v="${{ secrets.GPG_PRIVATE_KEY }}" ;;
              GPG_PASSPHRASE) v="${{ secrets.GPG_PASSPHRASE }}" ;;
            esac
            if [ -z "$v" ]; then echo "::error::secret $s is not set"; missing=$((missing+1)); fi
          done
          [ "$missing" -eq 0 ] || { echo "::error::$missing required secret(s) missing"; exit 1; }

      - name: Cache Maven
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: m2-publish-${{ hashFiles('**/pom.xml') }}
          restore-keys: m2-publish-

      - name: Download all native libraries
        uses: actions/download-artifact@v4
        with:
          pattern: native-*
          path: natives

      - name: Stage natives into resource trees (all platforms in one jar)
        run: |
          for dir in natives/native-*; do
            platform="${dir#natives/native-}"
            for m in wasm34j-native wasm34j-jni wasm34j-panama; do
              mkdir -p "$m/src/main/resources/META-INF/native/$platform/"
              cp "$dir"/* "$m/src/main/resources/META-INF/native/$platform/"
            done
          done
          find . -path '*/META-INF/native/*' -type f

      - name: Resolve release version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Deploy to Maven Central
        env:
          MAVEN_CENTRAL_USERNAME: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          MAVEN_CENTRAL_PASSWORD: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          ./mvnw -B -ntp deploy -P release -Pskip-native -DskipTests \
            -Drevision=${{ steps.version.outputs.version }} \
            -pl wasm34j,wasm34j-native,wasm34j-jni,wasm34j-panama

      - name: Create checksums
        run: |
          for dir in wasm34j wasm34j-native wasm34j-jni wasm34j-panama; do
            for jar in "$dir"/target/*.jar; do
              [ -f "$jar" ] && sha256sum "$jar" > "$jar.sha256"
            done
          done

      - name: Attach jars to the GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            wasm34j/target/*.jar
            wasm34j/target/*.jar.sha256
            wasm34j-native/target/*.jar
            wasm34j-native/target/*.jar.sha256
            wasm34j-jni/target/*.jar
            wasm34j-jni/target/*.jar.sha256
            wasm34j-panama/target/*.jar
            wasm34j-panama/target/*.jar.sha256
